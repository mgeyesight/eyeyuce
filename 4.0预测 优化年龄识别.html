 </div>
 </div>

 <script>
 // ==================== 密钥验证功能 ====================
 // 在这里设置你的密钥（可以设置多个，用逗号分隔）
 const VALID_KEYS = ['eye2024', 'vision123', 'doc2024'];
 
   function checkAuth() {
   // 密钥验证已取消，直接进入主界面
   showMainContent();
   }
 
 function verifyKey() {
 const inputKey = document.getElementById('authKey').value.trim();
 const errorEl = document.getElementById('authError');
 
 if (VALID_KEYS.includes(inputKey)) {
 sessionStorage.setItem('eye_auth_verified', 'true');
 errorEl.classList.remove('show');
 showMainContent();
 } else {
 errorEl.classList.add('show');
 }
 }
 
 document.getElementById('authKey').addEventListener('keypress', function(e) {
 if (e.key === 'Enter') {
 verifyKey();
 }
 });
 
 function showMainContent() {
 document.getElementById('authOverlay').classList.add('hidden');
 document.getElementById('mainContent').style.display = 'block';
 }
 
 // ==================== 干预手段选择功能 ====================
 let currentEye = null;
 let odInterventionData = [];
 let osInterventionData = [];
 let isSyncEnabled = true;
 
 const otherInputIds = [
 'other_lijiao', 'other_okjing', 'other_lijiaoruan', 'other_shijue',
 'other_hongguang', 'other_duxie', 'other_wushi', 'other_atuopin',
 'other_huwai', 'other_taideng', 'other_yingyang', 'other_zhongyi'
 ];
 
 function openInterventionModal(eye) {
 currentEye = eye;
 const modal = document.getElementById('interventionModal');
 const modalTitle = document.getElementById('modalTitle');
 const syncSection = document.getElementById('syncSection');
 
 modalTitle.textContent = (eye === 'od' ? '右眼' : '左眼') + '干预手段选择';
 
 // 如果是右眼，显示同步选项；如果是左眼且同步开启，隐藏同步选项
 if (eye === 'od') {
 syncSection.style.display = 'flex';
 document.getElementById('syncEyes').checked = isSyncEnabled;
 } else {
 if (isSyncEnabled) {
 syncSection.style.display = 'none';
 } else {
 syncSection.style.display = 'flex';
 document.getElementById('syncEyes').checked = false;
 }
 }
 
 // 加载当前选择
 loadInterventionSelections(eye);
 
 // 如果没有选择任何选项，默认勾选未干预
 const hasSelection = document.querySelectorAll('input[name="intervention"]:checked, input[name="intervention_other"]:checked').length > 0;
 if (!hasSelection) {
 const weiganYuCheckbox = document.getElementById('weiganyu_checkbox');
 if (weiganYuCheckbox) weiganYuCheckbox.checked = true;
 }
 
 updateCurrentSelection();
 
 modal.classList.add('show');
 }
 
 function closeInterventionModal() {
 document.getElementById('interventionModal').classList.remove('show');
 currentEye = null;
 }
 
 function toggleSync() {
 isSyncEnabled = document.getElementById('syncEyes').checked;
 }
 
 function handleWeiganYuChange() {
 const weiganYuCheckbox = document.getElementById('weiganyu_checkbox');
 if (weiganYuCheckbox && weiganYuCheckbox.checked) {
 // 取消所有其他选项的勾选
 document.querySelectorAll('input[name="intervention"]').forEach(cb => {
 if (cb.value !== '未干预') {
 cb.checked = false;
 }
 });
 document.querySelectorAll('input[name="intervention_other"]').forEach(cb => {
 cb.checked = false;
 });
 // 隐藏所有其他输入框
 otherInputIds.forEach(id => {
 const input = document.getElementById(id);
 if (input) {
 input.classList.remove('show');
 input.value = '';
 }
 });
 }
 updateCurrentSelection();
 }
 
 function handleOtherInterventionChange() {
 const weiganYuCheckbox = document.getElementById('weiganyu_checkbox');
 if (weiganYuCheckbox) {
 weiganYuCheckbox.checked = false;
 }
 updateCurrentSelection();
 }
 
 function toggleOtherInput(inputId) {
 const checkbox = document.querySelector(`input[name="intervention_other"][value="${inputId}"]`);

  function extractNumberFromChinese(text) {
  const directNumber = text.match(/-?\d+\.?\d*/);
  if (directNumber) {
  return directNumber[0];
  }
  
  const chineseNumbers = {
  '零': 0, '一': 1, '二': 2, '三': 3, '四': 4,
  '五': 5, '六': 6, '七': 7, '八': 8, '九': 9,
  '十': 10, '两': 2
  };
  
  let result = text;
  result = result.replace(/点/g, '.');
  result = result.replace(/[负减]/g, '-');
  
  for (let cn in chineseNumbers) {
  if (result.includes(cn)) {
  result = result.split(cn).join(chineseNumbers[cn]);
  }
  }
  
  const numberMatch = result.match(/-?\d+\.?\d*/);
  if (numberMatch) {
  return numberMatch[0];
  }
  
   return null;
   }

   processed = processed.replace(/(\d*)十(\d*)/g, function(match, p1, p2) {
   const ten = p1 ? parseInt(p1) * 10 : 10;
   const unit = p2 ? parseInt(p2) : 0;

   return `${year}-${month}-${day}`;

   // 格式3: 只说了年月日数字（如"2010 3 18"）
   const format3 = processed.match(/(\d{4})\s+(\d{1,2})\s+(\d{1,2})/);

   // 从格式化值提取日期字符串
    function getDateFromMask(maskValue) {
      if (!maskValue) return '';
      // 统一替换为斜杠再分割，支持 YYYY/MM/DD 和 YYYY-MM-DD 格式
      const normalizedValue = maskValue.replace(/-/g, '/');
      const parts = normalizedValue.split('/');
      if (parts.length !== 3) return '';
      if (parts[0].length !== 4 || parts[1].length !== 2 || parts[2].length !== 2) return '';
      return parts[0] + '-' + parts[1] + '-' + parts[2];
    }
   
    function calculateAge() {
      const birthDateValue = document.getElementById('birthDate').value;
      // 统一替换为斜杠再分割，支持 YYYY/MM/DD 和 YYYY-MM-DD 格式
      const normalizedValue = birthDateValue.replace(/-/g, '/');
      const parts = normalizedValue.split('/');
      if (parts.length !== 3) return;
      if (parts[0].length !== 4 || parts[1].length !== 2 || parts[2].length !== 2) return;
      
      const dateStr = parts[0] + '-' + parts[1] + '-' + parts[2];
      const birthDate = new Date(dateStr);
     if (isNaN(birthDate.getTime())) return;
     
     const today = new Date();
     let age = today.getFullYear() - birthDate.getFullYear();
     const monthDiff = today.getMonth() - birthDate.getMonth();
     if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
       age--;
     }
     if (age < 0) age = 0;
     document.getElementById('patientAge').value = age;
   }

 function getALCRRef(age) {
 if (age <= 5) return 2.92;
 if (age <= 9) return 2.99;
 if (age <= 12) return 3.03;
 if (age <= 15) return 3.07;
 return 3.08;
 }

 function getHyperopiaRef(age) {
 if (age >= 3 && age <= 5) return "约200~250度";
 if (age === 6) return "约175~245度";
 if (age === 7) return "约150~200度";
 if (age === 8) return "约120~180度";
 if (age === 9) return "约110~140度";
 if (age === 10) return "约90~120度";
 if (age === 11) return "约80~110度";
 if (age === 12) return "约60~85度";
 if (age === 13) return "约25~65度";
 if (age === 14) return "约10~25度";
 if (age >= 15) return "小于10度";
 return "约200~250度";
 }

 function calculateHyperopia(al, k, age) {
 const alcrRef = getALCRRef(age);
 const coefficient = age <= 5 ? 1.65 : age <= 9 ? 1.70 : age <= 12 ? 1.90 : 2.10;
 return ((alcrRef * (337.5 / k) - al) * coefficient).toFixed(2);
 }

 function calculateCriticalAL(k, age) {
 const alcrRef = getALCRRef(age);
 return (alcrRef * (337.5 / k)).toFixed(2);
 }

 function predictMyopiaTime(al, k, age) {
 const criticalAL = parseFloat(calculateCriticalAL(k, age));
 const alRemain = criticalAL - al;
 if (alRemain <= 0) return 0;
 let growthRate = age <= 9 ? 0.4 : age <= 12 ? 0.35 : 0.3;
 return (alRemain / growthRate).toFixed(1);
 }

 function predictAdultAL(al, age) {
 const growthTable = {1:6.1,2:5.5,3:4.9,4:4.4,5:4.9,6:3.5,7:3.1,8:2.8,9:2.5,10:2.2,11:1.9,12:1.6,13:1.3,14:1.0,15:0.8,16:0.6,17:0.4,18:0.2};
 const growth = growthTable[age] || 0.2;
 return (al + growth).toFixed(2);
 }

 function predictAdultDiopter(al, k, age) {
 const criticalAL = parseFloat(calculateCriticalAL(k, age));
 const adultAL = parseFloat(predictAdultAL(al, age));
 const growth = adultAL - al;
 return ((criticalAL - al) * 2.5 - growth * 2.5).toFixed(2);
 }

 function getGrowthControlTarget(age) {
 if (age >= 3 && age <= 5) return "≤0.25mm/年";
 if (age >= 6 && age <= 10) return "≤0.20mm/年";
 return "<0.20mm/年";
 }

 function getGrowthControlValue(age) {
 if (age >= 3 && age <= 5) return 0.25;
 if (age >= 6 && age <= 10) return 0.20;
 return 0.15;
 }

 function calculateTargetAL(currentAL, currentAge, targetAge) {
 let targetAL = currentAL;

 function getFatigueLevel(lt) {
 if (lt >= 2.5 && lt <= 3.5) return { level: '正常', class: 'highlight-green' };
 if (lt > 3.5 && lt < 4.0) return { level: '轻度', class: 'highlight-red' };
 if (lt >= 4.0 && lt <= 4.5) return { level: '中度', class: 'highlight-red' };
 if (lt >= 4.6) return { level: '重度', class: 'highlight-red' };
 return { level: '数据异常', class: 'highlight-red' };
 }

 function calculateALForDiopter(k, age, hyperopia) {
 const alcrRef = getALCRRef(age);
 const coefficient = age <= 5 ? 1.65 : age <= 9 ? 1.70 : age <= 12 ? 1.90 : 2.10;
 const al = alcrRef * (337.5 / k) - (hyperopia / coefficient);

 }

 const controlEffectiveness = {

 };

 function calculateControlDataForEye(baselineAL, monthlyGrowth) {
 const eyeControlData = {};
 Object.keys(controlMethodsData).forEach(key => {
 const effectiveness = controlEffectiveness[key] || 0;
 const remainingGrowth = 1 - effectiveness;
 const data = [];
 for (let month = 0; month <= 12; month += 3) {
 const al = baselineAL + (monthlyGrowth * remainingGrowth * month);
 data.push(parseFloat(al.toFixed(2)));
 }
 eyeControlData[key] = { name: controlMethodsData[key].name, color: controlMethodsData[key].color, data: data };
 });
 return eyeControlData;
 }

function calculateSingleLightData(baselineAL, monthlyGrowth) {
   const data = [];
   if (isNaN(baselineAL) || baselineAL === null || baselineAL === undefined) return [0, 0, 0, 0, 0];
   if (isNaN(monthlyGrowth) || monthlyGrowth === null || monthlyGrowth === undefined) monthlyGrowth = 0.03;
   for (let month = 0; month <= 12; month += 3) {
   const al = baselineAL + (monthlyGrowth * month);
   // 保留4位小数精度，parseFloat会自动去掉末尾的0
   data.push(parseFloat(al.toFixed(4)));
   }
   return data;
   }

 function calculateSingleLightYRange(odBaselineAL, odData, osBaselineAL, osData) {
 let minValue = Math.min(odBaselineAL, osBaselineAL, ...odData, ...osData);
 let maxValue = Math.max(odBaselineAL, osBaselineAL, ...odData, ...osData);
 const range = maxValue - minValue;
 const padding = range * 0.3;
 return { min: Math.floor((minValue - padding) * 10) / 10, max: Math.ceil((maxValue + padding) * 10) / 10 };
 }

 function calculateSingleEyeYRange(baselineAL, data) {
 const validData = data.filter(v => !isNaN(v) && v !== null && v !== undefined);
 if (validData.length === 0) return { min: Math.floor((baselineAL - 0.5) * 10) / 10, max: Math.ceil((baselineAL + 0.5) * 10) / 10 };
 let minValue = Math.min(baselineAL, ...validData);
 let maxValue = Math.max(baselineAL, ...validData);
 if (minValue === maxValue) { minValue -= 0.2; maxValue += 0.2; }
 const padding = (maxValue - minValue) * 0.15;
 return { min: Math.floor((minValue - padding) * 10) / 10, max: Math.ceil((maxValue + padding) * 10) / 10 };
 }

 function calculateUnifiedYRange(odBaselineAL, odControlData, osBaselineAL, osControlData) {
 let minValue = Math.min(odBaselineAL, osBaselineAL);
 let maxValue = Math.max(odBaselineAL, osBaselineAL);
 const allData = [...Object.values(odControlData), ...Object.values(osControlData)];
 allData.forEach(method => {
 if (method && method.data) method.data.forEach(val => { minValue = Math.min(minValue, val); maxValue = Math.max(maxValue, val); });
 });
 const padding = (maxValue - minValue) * 0.1;
 return { min: Math.floor((minValue - padding) * 10) / 10, max: Math.ceil((maxValue + padding) * 10) / 10 };
 }

 let annualALChartInstance = null;

 function drawSingleLightChart(canvasId, legendId, currentAL, data, unifiedYRange, monthlyGrowth, eyeLabel, intervention) {
 const ctx = document.getElementById(canvasId);
 if (!ctx) { console.error('Canvas not found:', canvasId); return; }
 if (!data || data.length === 0 || data.some(v => isNaN(v))) { console.error('Invalid data for', eyeLabel, data); return; }
 const existingChart = Chart.getChart(ctx);
 if (existingChart) existingChart.destroy();
 
 let yMin, yMax;
 if (unifiedYRange && !isNaN(unifiedYRange.min) && !isNaN(unifiedYRange.max)) {
 yMin = unifiedYRange.min;
 yMax = unifiedYRange.max;
 } else {
 const validData = data.filter(v => !isNaN(v));
 const dataMin = Math.min(...validData);
 const dataMax = Math.max(...validData);
 const range = dataMax - dataMin;
 yMin = Math.floor((dataMin - range * 0.3) * 10) / 10;
 yMax = Math.ceil((dataMax + range * 0.3) * 10) / 10;
 }
 
   // 根据月增速确定小数位数
   function getDecimalPlaces(growth) {
   if (growth >= 0.01) return 2;
   if (growth >= 0.001) return 3;
   return 4;
   }
   const decimalPlaces = getDecimalPlaces(monthlyGrowth);
   
   // 根据干预方式生成图表标签
   const chartLabel = intervention || '单光镜（未干预）';

   new Chart(ctx.getContext('2d'), {
   type: 'line',
   data: {
   labels: ['0个月', '3个月', '6个月', '9个月', '12个月'],
   datasets: [{ label: chartLabel, data: data, borderColor: '#C23531', backgroundColor: '#C2353120', borderWidth: 2, pointRadius: 5, pointBackgroundColor: '#C23531', tension: 0.3 }]
   },
   options: {
   responsive: true,
   maintainAspectRatio: false,
   plugins: {
   legend: { display: false },
   tooltip: { callbacks: { label: function(context) { return context.dataset.label + ': ' + context.parsed.y.toFixed(decimalPlaces) + 'mm'; } } }
   },
    scales: {
     y: { min: yMin, max: yMax, title: { display: true, text: '眼轴长度 (mm)', font: { size: 14, weight: 'bold' }, color: '#000' }, ticks: { font: { size: 13, weight: 'bold' }, color: '#000', stepSize: 0.1 } },
     x: { ticks: { font: { size: 12, weight: 'bold' }, color: '#000', autoSkip: false } }
    }
   },
   plugins: [{
afterDatasetsDraw: function(chart) {
     const ctx = chart.ctx;
     ctx.save();
     ctx.font = 'bold 12px Microsoft YaHei';
     ctx.fillStyle = '#B71C1C';
     ctx.textAlign = 'center';
     ctx.textBaseline = 'bottom';
     chart.data.datasets.forEach((dataset, i) => {
     const meta = chart.getDatasetMeta(i);
     meta.data.forEach((point, index) => {
     ctx.fillText(dataset.data[index].toFixed(decimalPlaces), point.x, point.y - 8);
     });
     });
     ctx.restore();
     }
   }]
   });
 
    const legendContainer = document.getElementById(legendId);
     if (legendContainer) legendContainer.innerHTML = `<span style="font-weight: bold; font-size: 12pt; color: #000;">${eyeLabel}起始眼轴：${currentAL.toFixed(decimalPlaces)}mm</span>，<span style="font-size: 12pt; color: #000;">月增速：${parseFloat(monthlyGrowth.toFixed(4))}mm</span>`;
    }

 function updateAnnualALLegend(datasets) {
 const legendContainer = document.getElementById('annualALLegend');
 if (!legendContainer) return;
 legendContainer.innerHTML = datasets.map(ds => `<div class="legend-item"><div class="legend-color" style="background: ${ds.borderColor};"></div><span>${ds.label}</span></div>`).join('');
 }

 function drawEyeChart(canvasId, currentAL, currentAge, gender) {
 const ctx = document.getElementById(canvasId).getContext('2d');
 
 const labels = [];
 const avgData = [];
 const noControlData = [];
 let maxValue = 26;
 
 let accumulatedAL = currentAL;
 let accumulatedTargetAL = currentAL;
 
 for (let age = 3; age <= 18; age++) {
 labels.push(age + '岁');
 const avgAL = getAverageAL(age, gender);
 avgData.push(avgAL);
 maxValue = Math.max(maxValue, avgAL);
 
 if (age === currentAge) {
 noControlData.push(currentAL);
 maxValue = Math.max(maxValue, currentAL);
 } else if (age > currentAge) {
 accumulatedAL = parseFloat((accumulatedAL + getAnnualGrowth(age)).toFixed(2));
 noControlData.push(accumulatedAL);
 maxValue = Math.max(maxValue, accumulatedAL);
 } else {
 noControlData.push(null);
 }
 }
 
 const yMax = Math.ceil(maxValue) + 1;
 const yMin = 20;
 
 new Chart(ctx, {
 type: 'line',
 data: {
 labels: labels,
 datasets: [
{ label: '同年龄同性别平均眼轴', data: avgData, borderColor: '#B0B0B0', backgroundColor: 'transparent', borderWidth: 2.5, pointRadius: 3, pointBackgroundColor: '#B0B0B0' },
  { label: '未干预眼轴发育预测', data: noControlData, borderColor: '#B71C1C', backgroundColor: 'transparent', borderWidth: 2.5, pointRadius: 4, pointBackgroundColor: '#B71C1C' }
 ]
 },
 options: {
 responsive: true,
 maintainAspectRatio: false,
 layout: {
  padding: {
   top: 30,
   right: 30,
   bottom: 10,
   left: 10
  }
 },
 plugins: { legend: { display: false }, datalabels: { display: false } },
  scales: {
   y: { min: yMin, max: yMax, title: { display: true, text: '眼轴长度 (mm)', font: { size: 14, weight: 'bold' }, color: '#000' }, ticks: { stepSize: 1, font: { size: 13, weight: 'bold' }, color: '#000' } },
   x: { ticks: { font: { size: 12, weight: 'bold' }, color: '#000', maxRotation: 45, autoSkip: false } }
  }
 },
 plugins: [{
 afterDatasetsDraw: function(chart) {
 const ctx = chart.ctx;
 ctx.save();
 const chartHeight = chart.chartArea.bottom - chart.chartArea.top;
 const isCompact = chartHeight < 150;
 
 chart.data.datasets.forEach((dataset, datasetIndex) => {
 const meta = chart.getDatasetMeta(datasetIndex);
 if (meta.hidden) return;
 
 meta.data.forEach((point, index) => {
 const value = dataset.data[index];
 if (value === null || value === undefined) return;
 
 let color, fontSize, offsetX, offsetY;
 
if (datasetIndex === 0) {
  color = '#666666';
  fontSize = isCompact ? '8px' : '11px';
  offsetX = 0;
  offsetY = isCompact ? 25 : 30;
  } else if (datasetIndex === 1) {
  color = '#B71C1C';
  fontSize = isCompact ? '9px' : '12px';
  offsetX = 0;
  offsetY = isCompact ? -18 : -22;
  }
 
ctx.font = 'bold ' + (isCompact ? '9px' : '12px') + ' Microsoft YaHei';
  ctx.fillStyle = color;
  ctx.save();
  ctx.translate(point.x + offsetX, point.y + offsetY);
  ctx.rotate(-Math.PI / 4);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(value.toFixed(2), 0, 0);
  ctx.restore();
 });
 });
 ctx.restore();
 }
 }]
 });
 }
